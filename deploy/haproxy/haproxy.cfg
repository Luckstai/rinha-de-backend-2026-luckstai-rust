global
    maxconn 4096

defaults
    mode http
    option dontlognull
    option http-keep-alive
    timeout connect 1s
    timeout client  5s
    timeout server  5s

frontend http_in
    bind *:9999
    default_backend apis

backend apis
    balance roundrobin
    option httpchk GET /ready
    http-check expect status 200
    server api1 api1:9999 check
    server api2 api2:9999 check
