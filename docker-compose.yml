services:
  lb:
    image: haproxy:3.0-alpine
    platform: linux/amd64
    container_name: rinha-lb
    ports:
      - "9999:9999"
    volumes:
      - ./deploy/haproxy/haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    depends_on:
      api1:
        condition: service_started
      api2:
        condition: service_started
    networks:
      - rinha-net
    deploy:
      resources:
        limits:
          cpus: "0.15"
          memory: "32MB"

  api1:
    build:
      context: .
      dockerfile: Dockerfile
    image: luckstai/rinha-2026-api:submission
    platform: linux/amd64
    container_name: rinha-api-1
    environment:
      RINHA_ALGORITHM: ivf
      BIND_ADDR: 0.0.0.0:9999
      APP_WORKERS: "1"
      RINHA_NORMALIZATION_PATH: /app/resources/normalization.json
      RINHA_MCC_RISK_PATH: /app/resources/mcc_risk.json
      RINHA_IVF_INDEX_PATH: /app/resources/references.n2048.s65536.i8.ivf
      RINHA_IVF_NPROBE: "12"
    networks:
      - rinha-net
    deploy:
      resources:
        limits:
          cpus: "0.425"
          memory: "159MB"

  api2:
    build:
      context: .
      dockerfile: Dockerfile
    image: luckstai/rinha-2026-api:submission
    platform: linux/amd64
    container_name: rinha-api-2
    environment:
      RINHA_ALGORITHM: ivf
      BIND_ADDR: 0.0.0.0:9999
      APP_WORKERS: "1"
      RINHA_NORMALIZATION_PATH: /app/resources/normalization.json
      RINHA_MCC_RISK_PATH: /app/resources/mcc_risk.json
      RINHA_IVF_INDEX_PATH: /app/resources/references.n2048.s65536.i8.ivf
      RINHA_IVF_NPROBE: "12"
    networks:
      - rinha-net
    deploy:
      resources:
        limits:
          cpus: "0.425"
          memory: "159MB"

networks:
  rinha-net:
    driver: bridge
